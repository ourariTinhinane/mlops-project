name: MLOps Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - 'develop'

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 : Toujours exécuté (feature/* ET develop)
  # ─────────────────────────────────────────────────────────────
  train:
    name: 🤖 Entraînement du modèle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Entraîner le modèle
        run: python train.py

      - name: Sauvegarder le modèle comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: model/model.pkl

  # ─────────────────────────────────────────────────────────────
  # JOB 2 : Uniquement sur develop
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/digits-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/digits-api:${{ github.sha }}
